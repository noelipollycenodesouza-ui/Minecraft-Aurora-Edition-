<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Aurora Edition v1.2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select: none;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#000;
}

/* ========================= */
/* TELAS DE CARREGAMENTO     */
/* ========================= */

#loadingScreen, #gameLoadingScreen {
    position:fixed;
    inset:0;
    background:#b30000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:opacity 1s;
}

#gameLoadingScreen {
    display: none;
    background: #141414;
}

.loadingTitle{
    font-size:70px;
    font-weight:900;
    color:white;
    text-shadow:
    3px 3px 0 #999,
    6px 6px 0 #555,
    9px 9px 15px rgba(0,0,0,.5);
}

.loadingSubtitle{
    color:white;
    font-size:28px;
    margin-top:10px;
}

.loadingBar{
    width:420px;
    max-width:90%;
    height:30px;
    margin-top:40px;
    background:rgba(0,0,0,.3);
    border:3px solid white;
}

.loadingFill{
    height:100%;
    width:0%;
    background:limegreen;
}

.loadingText{
    color:white;
    font-size:24px;
    margin-top:15px;
    text-align: center;
    max-width: 80%;
    min-height: 60px;
}

/* ========================= */
/* MENU PRINCIPAL            */
/* ========================= */

#mainMenu{
    display:none;
    width:100vw;
    height:100vh;
}

.background{
    position:fixed;
    inset:-25%;
    background:url("https://images.unsplash.com/photo-1614294148960-9aa740632a87?w=1200") center/cover;
    filter:blur(10px) brightness(.65);
    animation:girar 45s linear infinite;
}

@keyframes girar{
    from{ transform:rotate(0deg) scale(1.4); }
    to{ transform:rotate(360deg) scale(1.4); }
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
}

.menu{
    position:relative;
    z-index:5;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.minecraft{
    font-size:80px;
    font-weight:900;
    color:white;
    text-shadow:
    3px 3px 0 #cfcfcf,
    6px 6px 0 #9a9a9a,
    9px 9px 0 #5f5f5f,
    12px 12px 15px rgba(0,0,0,.7);
    text-align:center;
}

.aurora{
    text-align:center;
    color:white;
    font-size:30px;
    margin-bottom:35px;
    margin-top:10px;
}

.cubo{
    display:inline-block;
    width:28px;
    height:28px;
    background:linear-gradient(135deg,#00ffff,#7b68ee,#ff66ff);
    border:2px solid white;
    margin-right:8px;
    vertical-align:middle;
}

.btn{
    width:380px;
    padding:18px;
    margin:8px;
    font-size:24px;
    font-weight:bold;
    background:linear-gradient(#8a8a8a,#5f5f5f);
    color:white;
    border:3px solid #444;
    cursor:pointer;
    transition:.2s;
    box-shadow: inset 0 2px 0 rgba(255,255,255,.3), 0 6px 0 #333, 0 10px 15px rgba(0,0,0,.4);
}

.btn:hover{
    background:linear-gradient(#63d963,#2c9e2c);
    border-color:#1d6f1d;
    transform:translateY(-2px);
}

.btn:active{ transform:translateY(4px); }

.criarConta{
    position:fixed;
    left:20px;
    bottom:20px;
    width:230px;
    padding:15px;
    background:linear-gradient(#8a8a8a,#5f5f5f);
    color:white;
    border:3px solid #444;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.criarConta:hover{ background:linear-gradient(#63d963,#2c9e2c); }

.versao{
    position:fixed;
    right:20px;
    bottom:20px;
    color:white;
    font-size:22px;
    font-weight:bold;
}

/* ========================= */
/* TELA DE JOGAR (MODAL)     */
/* ========================= */

.modal-jogar {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.conteudo-modal {
    background: #2c2c2c;
    border: 4px solid #4a4a4a;
    width: 650px;
    max-width: 95%;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    position: relative;
}

.abas-container {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    border-bottom: 3px solid #4a4a4a;
    padding-bottom: 10px;
}

.aba-btn {
    flex: 1;
    padding: 12px;
    font-size: 20px;
    font-weight: bold;
    background: #1a1a1a;
    color: #7a7a7a;
    border: 2px solid #4a4a4a;
    cursor: pointer;
    margin: 0 4px;
}

.aba-btn.ativa {
    background: #4a4a4a;
    color: #fff;
    border-color: #fff;
}

.painel-conteudo {
    display: none;
    min-height: 250px;
    color: white;
}

.painel-conteudo.ativo {
    display: block;
}

.campo-grupo {
    margin-bottom: 20px;
}

.campo-grupo label {
    display: block;
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: bold;
}

.campo-grupo input[type="text"] {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    background: #1a1a1a;
    border: 2px solid #4a4a4a;
    color: white;
    outline: none;
}

.modo-opcoes {
    display: flex;
    gap: 10px;
}

.modo-btn {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    background: #1a1a1a;
    color: white;
    border: 2px solid #4a4a4a;
    cursor: pointer;
}

.modo-btn.selecionado {
    background: #2c9e2c;
    border-color: #fff;
}

.modal-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.btn-modal {
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border: 2px solid #444;
    color: white;
}

.btn-criar { background: #2c9e2c; }
.btn-criar:hover { background: #3cd03c; }
.btn-fechar { background: #b30000; }
.btn-fechar:hover { background: #e60000; }

/* ========================= */
/* TELA DO JOGO (3D REAL)    */
/* ========================= */

#gameContainer {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
}

.game-ui {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-family: monospace;
    font-size: 16px;
    text-shadow: 2px 2px 0 #000;
    background: rgba(0,0,0,0.5);
    padding: 15px;
    border: 2px solid #555;
    pointer-events: none;
    z-index: 55;
}

.btn-sair-jogo {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 20px;
    background: #b30000;
    color: white;
    border: 2px solid white;
    font-weight: bold;
    cursor: pointer;
    z-index: 60;
}

/* Mira no centro da tela */
.crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 55;
}
.crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255, 255, 255, 0.7);
}
.crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
.crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

@media(max-width:600px){
    .minecraft{ font-size:48px; }
    .aurora{ font-size:22px; }
    .btn{ width:90%; }
}
</style>
</head>
<body>

<div id="loadingScreen">
    <div class="loadingTitle">MINECRAFT</div>
    <div class="loadingSubtitle">Aurora Edition</div>
    <div class="loadingBar"><div class="loadingFill" id="loadingFill"></div></div>
    <div class="loadingText" id="loadingText">Carregando... 0%</div>
</div>

<div id="gameLoadingScreen">
    <div class="loadingTitle" style="font-size: 45px;">Gerando Mundo...</div>
    <div class="loadingBar"><div class="loadingFill" id="gameLoadingFill" style="background: dodgerblue;"></div></div>
    <div class="loadingText" id="gameLoadingText" style="font-style: italic; color: #ddd;">"Preparando blocos..."</div>
</div>

<div id="mainMenu">
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="menu">
        <div class="minecraft">MINECRAFT</div>
        <div class="aurora"><span class="cubo"></span>AURORA EDITION</div>

        <button class="btn" onclick="abrirModalJogar()">Jogar</button>
        <button class="btn" onclick="alert('Abrindo Configurações...')">Configurações</button>
        <button class="btn" onclick="alert('Abrindo Marketplace...')">Marketplace</button>
    </div>

    <button class="criarConta" onclick="alert('Sistema de Conta em desenvolvimento!')">Criar Conta</button>
    <div class="versao">v1.2</div>
</div>

<div class="modal-jogar" id="modalJogar">
    <div class="conteudo-modal">
        <div class="abas-container">
            <button class="aba-btn ativa" onclick="mudarAba('mundos')">Mundos</button>
            <button class="aba-btn" onclick="mudarAba('realms')">Realms</button>
            <button class="aba-btn" onclick="mudarAba('servidores')">Servidores</button>
        </div>

        <div id="painel-mundos" class="painel-conteudo ativo">
            <h3 style="margin-bottom:15px;">Criar Novo Mundo</h3>
            <div class="campo-grupo">
                <label>Nome do Mundo:</label>
                <input type="text" id="nomeMundo" value="Mundo das Montanhas">
            </div>
            <div class="campo-grupo">
                <label>Modo de Jogo:</label>
                <div class="modo-opcoes">
                    <button class="modo-btn selecionado" id="btn-criativo" onclick="selecionarModo('Criativo')">Criativo</button>
                    <button class="modo-btn" id="btn-sobrevivencia" onclick="selecionarModo('Sobrevivência')">Sobrevivência</button>
                    <button class="modo-btn" id="btn-hardcore" onclick="selecionarModo('Hardcore')">Hardcore</button>
                </div>
            </div>
        </div>

        <div id="painel-realms" class="painel-conteudo"><p style="text-align:center; margin-top:50px; color:#aaa;">Realms indisponível.</p></div>
        <div id="painel-servidores" class="painel-conteudo"><p style="text-align:center; margin-top:50px; color:#aaa;">Servidores indisponíveis.</p></div>

        <div class="modal-footer">
            <button class="btn-modal btn-fechar" onclick="fecharModalJogar()">Voltar</button>
            <button class="btn-modal btn-criar" id="btnCriarMundo" onclick="iniciarCarregamentoMundo()">Criar Mundo</button>
        </div>
    </div>
</div>

<div id="gameContainer">
    <div class="crosshair"></div>
    <button class="btn-sair-jogo" onclick="sairDoJogo()">Sair para o Menu</button>
    <div class="game-ui">
        <div id="ui-nome">Mundo: </div>
        <div id="ui-modo">Modo: </div>
        <div id="ui-pos" style="margin-top: 5px; color: lime;">X: 0 | Y: 0 | Z: 0</div>
        <div style="margin-top: 10px; font-size: 12px; color: #bbb;">
            [W, A, S, D] Mover<br>
            [Setas] Olhar ao Redor<br>
            [Espaço] Voar / Subir<br>
            [Shift] Descer
        </div>
    </div>
</div>

<script>
// --- Carregamento Inicial do Menu ---
let progresso = 0;
let barra = document.getElementById("loadingFill");
let texto = document.getElementById("loadingText");

let carregamento = setInterval(() => {
    progresso += 2;
    barra.style.width = progresso + "%";
    texto.innerHTML = "Carregando... " + progresso + "%";

    if(progresso >= 100){
        clearInterval(carregamento);
        setTimeout(()=>{
            document.getElementById("loadingScreen").style.opacity="0";
            setTimeout(()=>{
                document.getElementById("loadingScreen").style.display="none";
                document.getElementById("mainMenu").style.display="block";
            },500);
        },500);
    }
}, 15);

// --- Sistema de Menu/Abas ---
let modoSelecionado = "Criativo";
function abrirModalJogar() { document.getElementById("modalJogar").style.display = "flex"; }
function fecharModalJogar() { document.getElementById("modalJogar").style.display = "none"; }

function mudarAba(aba) {
    let botoes = document.querySelectorAll('.aba-btn');
    botoes.forEach(b => b.classList.remove('active'));
    let paineis = document.querySelectorAll('.painel-conteudo');
    paineis.forEach(p => p.classList.remove('ativo'));
    let btnCriar = document.getElementById("btnCriarMundo");
    
    if (aba === 'mundos') {
        document.getElementById('painel-mundos').classList.add('ativo');
        botoes[0].classList.add('ativa');
        btnCriar.style.display = "block";
    } else {
        btnCriar.style.display = "none";
    }
}

function selecionarModo(modo) {
    modoSelecionado = modo;
    document.getElementById("btn-criativo").classList.remove("selecionado");
    document.getElementById("btn-sobrevivencia").classList.remove("selecionado");
    document.getElementById("btn-hardcore").classList.remove("selecionado");
    if(modo === 'Criativo') document.getElementById("btn-criativo").classList.add("selecionado");
    if(modo === 'Sobrevivência') document.getElementById("btn-sobrevivencia").classList.add("selecionado");
    if(modo === 'Hardcore') document.getElementById("btn-hardcore").classList.add("selecionado");
}

// --- Novas Frases Solicitadas ---
const dicasMinecraft = [
    "Não mate golfinhos, seu monstro.",
    "Sabia que se assar um tronco de madeira em uma fornalha ele vira carvão vegetal?",
    "Nunca cave diretamente para baixo! (A lava te espera).",
    "Gatos espantam Creepers. Miau!",
    "Olhar nos olhos de um Enderman não é uma boa ideia...",
    "Precisa de lã? Use tesouras nas ovelhas para não machucá-las.",
    "Gerando montanhas infinitas com blocos de Pedra e Terra...",
    "Empilhando blocos de Grama perfeitamente quadradas..."
];

function iniciarCarregamentoMundo() {
    let nomeMundo = document.getElementById("nomeMundo").value || "Meu Mundo 3D";
    fecharModalJogar();
    document.getElementById("mainMenu").style.display = "none";
    
    let gameLoadingScreen = document.getElementById("gameLoadingScreen");
    let gameBar = document.getElementById("gameLoadingFill");
    let gameText = document.getElementById("gameLoadingText");
    
    gameLoadingScreen.style.display = "flex";
    
    let gameProgresso = 0;
    let fraseIndex = 0;
    gameText.innerHTML = `"${dicasMinecraft[0]}"`;

    let dicaInterval = setInterval(() => {
        fraseIndex = (fraseIndex + 1) % dicasMinecraft.length;
        gameText.innerHTML = `"${dicasMinecraft[fraseIndex]}"`;
    }, 1000);

    let jogoCarregado = setInterval(() => {
        gameProgresso += 2;
        gameBar.style.width = gameProgresso + "%";

        if(gameProgresso >= 100){
            clearInterval(jogoCarregado);
            clearInterval(dicaInterval);
            
            setTimeout(() => {
                gameLoadingScreen.style.display = "none";
                inicializarMundoMinecraft3D(nomeMundo, modoSelecionado);
            }, 400);
        }
    }, 40); 
}

// ==========================================
// ENGINE MINECRAFT 3D REAL (THREE.JS)
// ==========================================
let cena, camera, renderizador;
let jogandoAtivo = false;
let chaves = {};
let blocosCarregados = {};
let anguloHorizontal = 0, anguloVertical = 0;
const TAMANHO_BLOCO = 1;
const DISTANCIA_RENDER = 16; // Raio de renderização infinita ao redor do jogador

// Função simples para simular relevo (Montanhas) matematicamente
function obterAlturaMontanha(x, z) {
    let altura = Math.sin(x * 0.1) * Math.cos(z * 0.1) * 4;
    altura += Math.sin(x * 0.03) * 6; // Adiciona montanhas maiores
    return Math.floor(altura);
}

// Criar texturas pixeladas simuladas em Canvas para carregar super leve
function criarTexturaMinecraft(tipo) {
    let canvasTex = document.createElement('canvas');
    canvasTex.width = 16;
    canvasTex.height = 16;
    let ctxTex = canvasTex.getContext('2d');
    
    for(let x=0; x<16; x++) {
        for(let y=0; y<16; y++) {
            let ruido = Math.random() * 25;
            if(tipo === 'grama_topo') {
                ctxTex.fillStyle = `rgb(${40}, ${140 + ruido}, ${40})`;
            } else if (tipo === 'terra') {
                ctxTex.fillStyle = `rgb(${110 + ruido}, ${70 + ruido}, ${40})`;
            } else if (tipo === 'pedra') {
                ctxTex.fillStyle = `rgb(${110 + ruido}, ${110 + ruido}, ${110 + ruido})`;
            } else if (tipo === 'grama_lado') {
                if(y < 5) ctxTex.fillStyle = `rgb(${40}, ${140 + ruido}, ${40})`;
                else ctxTex.fillStyle = `rgb(${110 + ruido}, ${70 + ruido}, ${40})`;
            }
            ctxTex.fillRect(x, y, 1, 1);
        }
    }
    let textura = new THREE.CanvasTexture(canvasTex);
    textura.magFilter = THREE.NearestFilter; // Deixa o visual todo pixelado estilo original!
    textura.minFilter = THREE.NearestFilter;
    return new THREE.MeshLambertMaterial({ map: textura });
}

function inicializarMundoMinecraft3D(nome, modo) {
    document.getElementById("gameContainer").style.display = "block";
    document.getElementById("ui-nome").innerText = "Mundo: " + nome;
    document.getElementById("ui-modo").innerText = "Modo: " + modo;

    // Criar Cena e Câmera
    cena = new THREE.Scene();
    cena.background = new THREE.Color(0x78a7ff); // Céu do Mine
    cena.fog = new THREE.FogExp2(0x78a7ff, 0.05); // Névoa de distância

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 0); // Posição inicial do jogador

    renderizador = new THREE.WebGLRenderer({ antialias: false });
    renderizador.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("gameContainer").appendChild(renderizador.domElement);

    // Iluminação do Mundo
    let luzAmbiente = new THREE.AmbientLight(0xcccccc);
    cena.add(luzAmbiente);
    let luzSol = new THREE.DirectionalLight(0xffffff, 0.6);
    luzSol.position.set(10, 20, 15);
    cena.add(luzSol);

    // Preparar Materiais dos Blocos
    let matGramaTopo = criarTexturaMinecraft('grama_topo');
    let matGramaLado = criarTexturaMinecraft('grama_lado');
    let matTerra = criarTexturaMinecraft('terra');
    let matPedra = criarTexturaMinecraft('pedra');

    window.materiaisBloco = {
        grama: [matGramaLado, matGramaLado, matGramaTopo, matTerra, matGramaLado, matGramaLado], // Laterais, cima, baixo
        terra: Array(6).fill(matTerra),
        pedra: Array(6).fill(matPedra)
    };

    // Eventos
    window.addEventListener("resize", onWindowResize);
    window.addEventListener("keydown", (e) => chaves[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", (e) => chaves[e.key.toLowerCase()] = false);

    jogandoAtivo = true;
    loopMinecraft();
}

// Atualiza e gera blocos infinitamente ao redor da posição do jogador!
function atualizarChunksInfinitos() {
    let pX = Math.floor(camera.position.x);
    let pZ = Math.floor(camera.position.z);
    
    let geo = new THREE.BoxGeometry(TAMANHO_BLOCO, TAMANHO_BLOCO, TAMANHO_BLOCO);

    for (let x = pX - DISTANCIA_RENDER; x < pX + DISTANCIA_RENDER; x++) {
        for (let z = pZ - DISTANCIA_RENDER; z < pZ + DISTANCIA_RENDER; z++) {
            let chave = `${x},${z}`;
            
            // Se esse pedaço de coluna ainda não foi gerado, vamos criar!
            if (!blocosCarregados[chave]) {
                blocosCarregados[chave] = true;
                let alturaMaxima = obterAlturaMontanha(x, z);

                // Criar coluna de blocos
                for (let y = alturaMaxima - 5; y <= alturaMaxima; y++) {
                    let tipoMaterial = materiaisBloco.pedra; // Base profunda de pedra
                    
                    if (y === alturaMaxima) {
                        tipoMaterial = materiaisBloco.grama; // Superfície é Grama
                    } else if (y > alturaMaxima - 3) {
                        tipoMaterial = materiaisBloco.terra; // Meio é Terra
                    }

                    let bloco = new THREE.Mesh(geo, tipoMaterial);
                    bloco.position.set(x, y, z);
                    cena.add(bloco);
                }
            }
        }
    }
}

function gerenciarControles() {
    let velocidade = 0.15;
    let velRotacao = 0.03;

    // Olhar ao redor (Setas esquerda/direita/cima/baixo)
    if (chaves["arrowleft"]) anguloHorizontal += velRotacao;
    if (chaves["arrowright"]) anguloHorizontal -= velRotacao;
    if (chaves["arrowup"]) anguloVertical = Math.min(Math.PI/2.2, anguloVertical + velRotacao);
    if (chaves["arrowdown"]) anguloVertical = Math.max(-Math.PI/2.2, anguloVertical - velRotacao);

    // Atualizar rotação da câmera
    let direcao = new THREE.Vector3();
    direcao.x = Math.sin(anguloHorizontal) * Math.cos(anguloVertical);
    direcao.y = Math.sin(anguloVertical);
    direcao.z = Math.cos(anguloHorizontal) * Math.cos(anguloVertical);
    
    let alvo = camera.position.clone().add(direcao);
    camera.lookAt(alvo);

    // Mover jogador (W, S, A, D) baseado para onde ele olha
    let direcaoMovimento = new THREE.Vector3(Math.sin(anguloHorizontal), 0, Math.cos(anguloHorizontal)).normalize();
    
    if (chaves["w"]) {
        camera.position.x += direcaoMovimento.x * velocidade;
        camera.position.z += direcaoMovimento.z * velocidade;
    }
    if (chaves["s"]) {
        camera.position.x -= direcaoMovimento.x * velocidade;
        camera.position.z -= direcaoMovimento.z * velocidade;
    }
    if (chaves["a"]) {
        camera.position.x += direcaoMovimento.z * velocidade;
        camera.position.z -= direcaoMovimento.x * velocidade;
    }
    if (chaves["d"]) {
        camera.position.x -= direcaoMovimento.z * velocidade;
        camera.position.z += direcaoMovimento.x * velocidade;
    }

    // Voar/Subir e Descer (Espaço e Shift)
    if (chaves[" "]) camera.position.y += velocidade;
    if (chaves["shift"]) camera.position.y -= velocidade;

    // Atualiza a UI com a posição exata
    document.getElementById("ui-pos").innerText = `X: ${Math.floor(camera.position.x)} | Y: ${Math.floor(camera.position.y)} | Z: ${Math.floor(camera.position.z)}`;
}

function loopMinecraft() {
    if (!jogandoAtivo) return;
    
    gerenciarControles();
    atualizarChunksInfinitos();
    renderizador.render(cena, camera);
    
    requestAnimationFrame(loopMinecraft);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderizador.setSize(window.innerWidth, window.innerHeight);
}

function sairDoJogo() {
    jogandoAtivo = false;
    document.getElementById("gameContainer").style.display = "none";
    // Limpa o canvas do jogo anterior
    let canvasDom = renderizador.domElement;
    if (canvasDom && canvasDom.parentNode) {
        canvasDom.parentNode.removeChild(canvasDom);
    }
    blocosCarregados = {};
    document.getElementById("mainMenu").style.display = "block";
}
</script>
