<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Aurora Edition v1.2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#000;
}

/* ========================= */
/* TELAS DE CARREGAMENTO     */
/* ========================= */

#loadingScreen, #gameLoadingScreen {
    position:fixed;
    inset:0;
    background:#b30000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:opacity 1s;
}

#gameLoadingScreen {
    display: none;
    background: #1a1a1a; /* Fundo escuro para o carregamento do jogo */
}

.loadingTitle{
    font-size:70px;
    font-weight:900;
    color:white;
    text-shadow:
    3px 3px 0 #999,
    6px 6px 0 #555,
    9px 9px 15px rgba(0,0,0,.5);
}

.loadingSubtitle{
    color:white;
    font-size:28px;
    margin-top:10px;
}

.loadingBar{
    width:420px;
    max-width:90%;
    height:30px;
    margin-top:40px;
    background:rgba(0,0,0,.3);
    border:3px solid white;
}

.loadingFill{
    height:100%;
    width:0%;
    background:limegreen;
}

.loadingText{
    color:white;
    font-size:24px;
    margin-top:15px;
    text-align: center;
    max-width: 80%;
}

/* ========================= */
/* MENU PRINCIPAL            */
/* ========================= */

#mainMenu{
    display:none;
    width:100vw;
    height:100vh;
}

.background{
    position:fixed;
    inset:-25%;
    background:url("https://images.unsplash.com/photo-1614294148960-9aa740632a87?w=1200") center/cover;
    filter:blur(10px) brightness(.65);
    animation:girar 45s linear infinite;
}

@keyframes girar{
    from{ transform:rotate(0deg) scale(1.4); }
    to{ transform:rotate(360deg) scale(1.4); }
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
}

.menu{
    position:relative;
    z-index:5;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.minecraft{
    font-size:80px;
    font-weight:900;
    color:white;
    text-shadow:
    3px 3px 0 #cfcfcf,
    6px 6px 0 #9a9a9a,
    9px 9px 0 #5f5f5f,
    12px 12px 15px rgba(0,0,0,.7);
    text-align:center;
}

.aurora{
    text-align:center;
    color:white;
    font-size:30px;
    margin-bottom:35px;
    margin-top:10px;
}

.cubo{
    display:inline-block;
    width:28px;
    height:28px;
    background:linear-gradient(135deg,#00ffff,#7b68ee,#ff66ff);
    border:2px solid white;
    margin-right:8px;
    vertical-align:middle;
}

.btn{
    width:380px;
    padding:18px;
    margin:8px;
    font-size:24px;
    font-weight:bold;
    background:linear-gradient(#8a8a8a,#5f5f5f);
    color:white;
    border:3px solid #444;
    cursor:pointer;
    transition:.2s;
    box-shadow: inset 0 2px 0 rgba(255,255,255,.3), 0 6px 0 #333, 0 10px 15px rgba(0,0,0,.4);
}

.btn:hover{
    background:linear-gradient(#63d963,#2c9e2c);
    border-color:#1d6f1d;
    transform:translateY(-2px);
}

.btn:active{ transform:translateY(4px); }

.criarConta{
    position:fixed;
    left:20px;
    bottom:20px;
    width:230px;
    padding:15px;
    background:linear-gradient(#8a8a8a,#5f5f5f);
    color:white;
    border:3px solid #444;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.criarConta:hover{ background:linear-gradient(#63d963,#2c9e2c); }

.versao{
    position:fixed;
    right:20px;
    bottom:20px;
    color:white;
    font-size:22px;
    font-weight:bold;
}

/* ========================= */
/* TELA DE JOGAR (MODAL)     */
/* ========================= */

.modal-jogar {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.conteudo-modal {
    background: #2c2c2c;
    border: 4px solid #4a4a4a;
    width: 650px;
    max-width: 95%;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    position: relative;
}

/* Abas Superiores */
.abas-container {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    border-bottom: 3px solid #4a4a4a;
    padding-bottom: 10px;
}

.aba-btn {
    flex: 1;
    padding: 12px;
    font-size: 20px;
    font-weight: bold;
    background: #1a1a1a;
    color: #7a7a7a;
    border: 2px solid #4a4a4a;
    cursor: pointer;
    margin: 0 4px;
}

.aba-btn.ativa {
    background: #4a4a4a;
    color: #fff;
    border-color: #fff;
}

/* Paineis de Conteúdo */
.painel-conteudo {
    display: none;
    min-height: 250px;
    color: white;
}

.painel-conteudo.ativo {
    display: block;
}

/* Tela de Criação de Mundo */
.campo-grupo {
    margin-bottom: 20px;
}

.campo-grupo label {
    display: block;
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: bold;
}

.campo-grupo input[type="text"] {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    background: #1a1a1a;
    border: 2px solid #4a4a4a;
    color: white;
    outline: none;
}

.modo-opcoes {
    display: flex;
    gap: 10px;
}

.modo-btn {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    background: #1a1a1a;
    color: white;
    border: 2px solid #4a4a4a;
    cursor: pointer;
}

.modo-btn.selecionado {
    background: #2c9e2c;
    border-color: #fff;
}

/* Botões Inferiores do Modal */
.modal-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.btn-modal {
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border: 2px solid #444;
    color: white;
}

.btn-criar { background: #2c9e2c; }
.btn-criar:hover { background: #3cd03c; }
.btn-fechar { background: #b30000; }
.btn-fechar:hover { background: #e60000; }

/* Responsivo */
@media(max-width:600px){
    .minecraft{ font-size:48px; }
    .aurora{ font-size:22px; }
    .btn{ width:90%; }
    .abas-container { flex-direction: column; gap: 5px; }
    .modo-opcoes { flex-direction: column; }
}
</style>
</head>
<body>

<div id="loadingScreen">
    <div class="loadingTitle">MINECRAFT</div>
    <div class="loadingSubtitle">Aurora Edition</div>
    <div class="loadingBar"><div class="loadingFill" id="loadingFill"></div></div>
    <div class="loadingText" id="loadingText">Carregando... 0%</div>
</div>

<div id="gameLoadingScreen">
    <div class="loadingTitle" style="font-size: 45px;">Gerando Mundo...</div>
    <div class="loadingBar"><div class="loadingFill" id="gameLoadingFill" style="background: dodgerblue;"></div></div>
    <div class="loadingText" id="gameLoadingText" style="font-style: italic; color: #ddd;">"Não mate golfinhos, seu monstro."</div>
</div>

<div id="mainMenu">
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="menu">
        <div class="minecraft">MINECRAFT</div>
        <div class="aurora"><span class="cubo"></span>AURORA EDITION</div>

        <button class="btn" onclick="abrirModalJogar()">Jogar</button>
        <button class="btn" onclick="alert('Abrindo Configurações...')">Configurações</button>
        <button class="btn" onclick="alert('Abrindo Marketplace...')">Marketplace</button>
    </div>

    <button class="criarConta" onclick="alert('Sistema de Conta em desenvolvimento!')">Criar Conta</button>
    <div class="versao">v1.2</div>
</div>

<div class="modal-jogar" id="modalJogar">
    <div class="conteudo-modal">
        
        <div class="abas-container">
            <button class="aba-btn ativa" onclick="mudarAba('mundos')">Mundos</button>
            <button class="aba-btn" onclick="mudarAba('realms')">Realms</button>
            <button class="aba-btn" onclick="mudarAba('servidores')">Servidores</button>
        </div>

        <div id="painel-mundos" class="painel-conteudo ativo">
            <h3 style="margin-bottom:15px;">Criar Novo Mundo</h3>
            
            <div class="campo-grupo">
                <label>Nome do Mundo:</label>
                <input type="text" id="nomeMundo" value="Meu Mundo">
            </div>

            <div class="campo-grupo">
                <label>Modo de Jogo:</label>
                <div class="modo-opcoes">
                    <button class="modo-btn selecionado" id="btn-criativo" onclick="selecionarModo('Criativo')">Criativo</button>
                    <button class="modo-btn" id="btn-sobrevivencia" onclick="selecionarModo('Sobrevivência')">Sobrevivência</button>
                    <button class="modo-btn" id="btn-hardcore" onclick="selecionarModo('Hardcore')">Hardcore</button>
                </div>
            </div>
        </div>

        <div id="painel-realms" class="painel-conteudo">
            <p style="text-align:center; margin-top:50px; color:#aaa;">Realms não disponível nesta versão.</p>
        </div>

        <div id="painel-servidores" class="painel-conteudo">
            <p style="text-align:center; margin-top:50px; color:#aaa;">Servidores não disponíveis nesta versão.</p>
        </div>

        <div class="modal-footer">
            <button class="btn-modal btn-fechar" onclick="fecharModalJogar()">Voltar</button>
            <button class="btn-modal btn-criar" id="btnCriarMundo" onclick="iniciarCarregamentoMundo()">Criar Mundo</button>
        </div>

    </div>
</div>

<script>
// --- Carregamento Inicial ---
let progresso = 0;
let barra = document.getElementById("loadingFill");
let texto = document.getElementById("loadingText");

let carregamento = setInterval(() => {
    progresso++;
    barra.style.width = progresso + "%";
    texto.innerHTML = "Carregando... " + progresso + "%";

    if(progresso >= 100){
        clearInterval(carregamento);
        setTimeout(()=>{
            document.getElementById("loadingScreen").style.opacity="0";
            setTimeout(()=>{
                document.getElementById("loadingScreen").style.display="none";
                document.getElementById("mainMenu").style.display="block";
            },1000);
        },500);
    }
}, 40);

// --- Sistema do Menu de Jogar (Abas) ---
let modoSelecionado = "Criativo";

function abrirModalJogar() {
    document.getElementById("modalJogar").style.display = "flex";
}

function fecharModalJogar() {
    document.getElementById("modalJogar").style.display = "none";
}

function mudarAba(aba) {
    // Resetar botões das abas
    let botoes = document.querySelectorAll('.aba-btn');
    botoes.forEach(b => b.classList.remove('ativa'));
    
    // Resetar painéis
    let paineis = document.querySelectorAll('.painel-conteudo');
    paineis.forEach(p => p.classList.remove('ativo'));

    // Ativar o correto e gerenciar botão de criar mundo
    let btnCriar = document.getElementById("btnCriarMundo");
    if (aba === 'mundos') {
        document.getElementById('painel-mundos').classList.add('ativo');
        botoes[0].classList.add('ativa');
        btnCriar.style.display = "block";
    } else if (aba === 'realms') {
        document.getElementById('painel-realms').classList.add('ativo');
        botoes[1].classList.add('ativa');
        btnCriar.style.display = "none";
    } else if (aba === 'servidores') {
        document.getElementById('painel-servidores').classList.add('ativo');
        botoes[2].classList.add('ativa');
        btnCriar.style.display = "none";
    }
}

function selecionarModo(modo) {
    modoSelecionado = modo;
    document.getElementById("btn-criativo").classList.remove("selecionado");
    document.getElementById("btn-sobrevivencia").classList.remove("selecionado");
    document.getElementById("btn-hardcore").classList.remove("selecionado");

    if(modo === 'Criativo') document.getElementById("btn-criativo").classList.add("selecionado");
    if(modo === 'Sobrevivência') document.getElementById("btn-sobrevivencia").classList.add("selecionado");
    if(modo === 'Hardcore') document.getElementById("btn-hardcore").classList.add("selecionadd"); // Corrigido a classe abaixo
    if(modo === 'Hardcore') document.getElementById("btn-hardcore").className = "modo-btn selecionado";
}

// --- Nova Tela de Carregamento do Mundo ---
const dicasMinecraft = [
    "Não mate golfinhos, seu monstro.",
    "Sabia que se assar um tronco de madeira em uma fornalha ele vira carvão vegetal?",
    "Nunca cave diretamente para baixo!",
    "Gatos espantam Creepers. Miau!",
    "Olhar nos olhos de um Enderman não é uma boa ideia.",
    "Precisa de lã? Use tesouras nas ovelhas para não machucá-las."
];

function iniciarCarregamentoMundo() {
    let nomeMundo = document.getElementById("nomeMundo").value || "Meu Mundo";
    
    // Fechar o modal e abrir a nova tela de carregamento do jogo
    fecharModalJogar();
    document.getElementById("mainMenu").style.display = "none";
    
    let gameLoadingScreen = document.getElementById("gameLoadingScreen");
    let gameBar = document.getElementById("gameLoadingFill");
    let gameText = document.getElementById("gameLoadingText");
    
    gameLoadingScreen.style.display = "flex";
    gameLoadingScreen.style.opacity = "1";
    
    let gameProgresso = 0;
    gameBar.style.width = "0%";
    
    // Escolhe uma dica aleatória
    let dicaAleatoria = dicasMinecraft[Math.floor(Math.random() * dicasMinecraft.length)];
    gameText.innerHTML = `"${dicaAleatoria}"`;

    // Intervalo de troca de dicas a cada 2 segundos se demorar
    let dicaInterval = setInterval(() => {
        let novaDica = dicasMinecraft[Math.floor(Math.random() * dicasMinecraft.length)];
        gameText.innerHTML = `"${novaDica}"`;
    }, 2000);

    let jogoCarregado = setInterval(() => {
        gameProgresso += 2; // Sobe de 2 em 2%
        gameBar.style.width = gameProgresso + "%";

        if(gameProgresso >= 100){
            clearInterval(jogoCarregado);
            clearInterval(dicaInterval);
            
            setTimeout(() => {
                alert(`Mundo "${nomeMundo}" criado com sucesso no modo ${modoSelecionado}! (Aqui começaria o seu jogo)`);
                // Volta para o menu principal após fechar o alerta
                gameLoadingScreen.style.display = "none";
                document.getElementById("mainMenu").style.display = "block";
            }, 500);
        }
    }, 60); // Velocidade do carregamento do mundo
}
</script>

</body>
</html>
